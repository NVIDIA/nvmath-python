name: Feature Request
description: Suggest an idea to improve nvmath-python
title: '[FEA]: '
labels: ['feature request']
body:
  - type: checkboxes
    id: check-duplicates
    attributes:
      label: Is this a duplicate?
      description: Check for duplicate issues.
      options:
        - label: I confirmed there appear to be no [duplicate issues](https://github.com/NVIDIA/nvmath-python/issues) for this request and that I agree to the [Code of Conduct](CODE_OF_CONDUCT.md)

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What area does this request apply to?
      multiple: false
      options:
        - fft
        - linalg
        - sparse
        - tensor
        - distributed
        - bindings
        - device
        - General nvmath-python
        - Infrastructure
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is, e.g., "I would like to be able to..."
      placeholder: I would like to be able to use `nvmath.linalg.advanced.Matmul(...)` with a new epilog type.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: |
        Add support for the new epilog in `nvmath.linalg.advanced.Matmul`.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description:
        If applicable, please add a clear and concise description of any alternative solutions or features you've
        considered.
      placeholder: The alternatives are unappealing — they usually involve dropping down to the raw cuBLAS/cuFFT/... bindings and reimplementing the surrounding plan/execute/free scaffolding by hand.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the request here.
      placeholder: This would make it much easier to use accelerated math kernels from Python for my project.
    validations:
      required: false
