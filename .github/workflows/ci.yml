# Note: This workflow name is referred to in the test job, so make sure any
# changes are sync'd up.
name: "CI"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "pull-request/[0-9]+"
      - "main"
    tags:
      # Build release artifacts from tag refs so setuptools-scm resolves exact
      # release versions instead of .dev+local variants.
      - "v*"
  # Do not schedule nightly runs of public CI.
  # schedule:
  #   # every 24 hours at midnight UTC
  #   - cron: "0 0 * * *"

# TODO(nvmath-python CI matrix): The full test matrix that nvmath-python needs
# to exercise varies (CTK install method) x (module) x (backend) x (arch).
# Captured here for follow-up implementation in build-wheel.yml / test-wheel-*.yml:
#
#   CTK,      Module,       CuPy,  PyTorch, NVPL/MKL, Memcheck, Oldest Arch,     Newest Arch,     Host
#   cu12,     callbacks,    TRUE,  FALSE,   FALSE,    FALSE,    Volta (7.0),     Hopper (9.0),    Linux x86
#   cu12,     host,         TRUE,  FALSE,   TRUE,     FALSE,    Volta (7.0),     Hopper (9.0),    Linux x86
#   cu13,     callbacks,    TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   cu13,     host,         FALSE, FALSE,   TRUE,     FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   cu12,     distributed,  TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   cu13,     distributed,  TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   cu12,     device,       FALSE, TRUE,    FALSE,    FALSE,    Lovelace (8.9),  Hopper (9.0),    Linux x86
#   cu12,     host,         FALSE, TRUE,    FALSE,    FALSE,    Lovelace (8.9),  Hopper (9.0),    Linux x86
#   cu13,     device,       TRUE,  FALSE,   FALSE,    FALSE,    Blackwell (10.0),Blackwell (12.0),Linux x86
#   cu13,     host,         TRUE,  FALSE,   FALSE,    FALSE,    Blackwell (10.0),Blackwell (12.0),Linux x86
#   cu13,     device,       FALSE, TRUE,    FALSE,    FALSE,    Blackwell (10.0),Blackwell (12.0),Linux x86
#   cu13,     host,         FALSE, TRUE,    FALSE,    FALSE,    Blackwell (10.0),Blackwell (12.0),Linux x86
#   sysctk12, host,         TRUE,  FALSE,   FALSE,    FALSE,    Volta (7.0),     Hopper (9.0),    Linux x86
#   sysctk12, distributed,  TRUE,  FALSE,   FALSE,    FALSE,    Volta (7.0),     Hopper (9.0),    Linux x86
#   sysctk13, callbacks,    TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   sysctk13, device,       TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#   sysctk13, distributed,  TRUE,  FALSE,   FALSE,    FALSE,    Turing (7.5),    Hopper (9.0),    Linux x86
#
# Windows coverage is intentionally absent from the above. Revisit whether
# the Windows build/test jobs below should stay.
#
# Starter CTK matrix used until the full matrix is wired in:
#   ctk-variant: [cu12, cu13]

jobs:
  should-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.get-should-skip.outputs.skip }}
      doc-only: ${{ steps.get-should-skip.outputs.doc_only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Compute whether to skip builds and tests
        id: get-should-skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          if ${{ startsWith(github.ref_name, 'pull-request/') }}; then
            pr_number="$(grep -Po '(\d+)$' <<< '${{ github.ref_name }}')"
            pr_title="$(gh pr view "${pr_number}" --json title --jq '.title')"
            skip="$(echo "${pr_title}" | grep -q '\[no-ci\]' && echo true || echo false)"
            doc_only="$(echo "${pr_title}" | grep -q '\[doc-only\]' && echo true || echo false)"
          else
            skip=false
            doc_only=false
          fi
          echo "skip=${skip}" >> "$GITHUB_OUTPUT"
          echo "doc_only=${doc_only}" >> "$GITHUB_OUTPUT"

  # Detect which nvmath submodules a PR touches so test jobs can skip
  # unaffected submodules. nvmath-python is a single wheel, so build gating
  # is binary (built or skipped) — per-submodule gating only applies to tests.
  #
  # Dependency graph (verified against the nvmath package layout):
  #   shared infra -> forces retest of every submodule
  #   nvmath/bindings/** -> forces retest of every submodule (all user-facing
  #                         submodules import from nvmath.bindings)
  #   nvmath/<submodule>/** -> retest only that submodule
  #
  # Shared infra bucket:
  #   nvmath/internal/**, nvmath/_internal/**, nvmath/_utils.py, nvmath/memory.py,
  #   pyproject.toml, .github/**, ci/**, conftest.py, ruff.toml, etc.
  #
  # On push to main, tag refs, or schedule events we unconditionally run
  # everything because there is no meaningful "changed paths" baseline.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bindings: ${{ steps.compose.outputs.bindings }}
      fft: ${{ steps.compose.outputs.fft }}
      linalg: ${{ steps.compose.outputs.linalg }}
      sparse: ${{ steps.compose.outputs.sparse }}
      tensor: ${{ steps.compose.outputs.tensor }}
      distributed: ${{ steps.compose.outputs.distributed }}
      device: ${{ steps.compose.outputs.device }}
      shared: ${{ steps.compose.outputs.shared }}
      build: ${{ steps.compose.outputs.build }}
      test_bindings: ${{ steps.compose.outputs.test_bindings }}
      test_fft: ${{ steps.compose.outputs.test_fft }}
      test_linalg: ${{ steps.compose.outputs.test_linalg }}
      test_sparse: ${{ steps.compose.outputs.test_sparse }}
      test_tensor: ${{ steps.compose.outputs.test_tensor }}
      test_distributed: ${{ steps.compose.outputs.test_distributed }}
      test_device: ${{ steps.compose.outputs.test_device }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      # copy-pr-bot pushes every PR to pull-request/<N>, so the base branch
      # cannot be inferred from github.ref_name. Look it up via the upstream
      # PR metadata so the diff below is rooted at the right place.
      - name: Resolve PR base branch
        id: pr-info
        if: ${{ startsWith(github.ref_name, 'pull-request/') }}
        uses: nv-gha-runners/get-pr-info@main

      - name: Detect changed paths
        id: filter
        if: ${{ startsWith(github.ref_name, 'pull-request/') }}
        env:
          # GitHub Actions evaluates step-level `env:` expressions eagerly —
          # the step's `if:` gate does NOT short-circuit them. On non-PR
          # events (push/tag/schedule), `pr-info` is skipped and its outputs
          # are empty strings, so `fromJSON('')` would raise a template error
          # and fail the step despite `if:` being false. Guard the
          # `fromJSON` call with a short-circuit so the expression resolves
          # to an empty string on non-PR events; the step is still gated
          # off by `if:`, so `BASE_REF` is never consumed there.
          BASE_REF: ${{ steps.pr-info.outputs.pr-info && fromJSON(steps.pr-info.outputs.pr-info).base.ref || '' }}
        run: |
          # Diff against the merge base with the PR's actual target branch.
          # Uses merge-base so diverged branches only show files changed on
          # the PR side, not upstream commits.
          if [[ -z "${BASE_REF}" ]]; then
            echo "Could not resolve PR base branch from get-pr-info output" >&2
            exit 1
          fi
          base=$(git merge-base HEAD "origin/${BASE_REF}")
          changed=$(git diff --name-only "$base"...HEAD)

          has_match() {
            grep -qE "$1" <<< "$changed" && echo true || echo false
          }

          {
            echo "bindings=$(has_match '^nvmath/bindings/')"
            echo "fft=$(has_match '^nvmath/fft/')"
            echo "linalg=$(has_match '^nvmath/linalg/')"
            echo "sparse=$(has_match '^nvmath/sparse/')"
            echo "tensor=$(has_match '^nvmath/tensor/')"
            echo "distributed=$(has_match '^nvmath/distributed/')"
            echo "device=$(has_match '^nvmath/device/')"
            echo "shared=$(has_match '^(nvmath/internal/|nvmath/_internal/|nvmath/_utils\.py$|nvmath/memory\.py$|nvmath/__init__\.py$|builder/|\.github/|ci/|scripts/|toolshed/|conftest\.py$|pyproject\.toml$|pytest\.ini$|ruff\.toml$)')"
          } >> "$GITHUB_OUTPUT"

      - name: Compose gating outputs
        id: compose
        env:
          IS_PR: ${{ startsWith(github.ref_name, 'pull-request/') }}
          BINDINGS: ${{ steps.filter.outputs.bindings || 'false' }}
          FFT: ${{ steps.filter.outputs.fft || 'false' }}
          LINALG: ${{ steps.filter.outputs.linalg || 'false' }}
          SPARSE: ${{ steps.filter.outputs.sparse || 'false' }}
          TENSOR: ${{ steps.filter.outputs.tensor || 'false' }}
          DISTRIBUTED: ${{ steps.filter.outputs.distributed || 'false' }}
          DEVICE: ${{ steps.filter.outputs.device || 'false' }}
          SHARED: ${{ steps.filter.outputs.shared || 'false' }}
        run: |
          set -euxo pipefail
          # Non-PR events (push to main, tag push, schedule, workflow_dispatch)
          # always exercise the full pipeline because there is no baseline for
          # a meaningful diff.
          if [[ "${IS_PR}" != "true" ]]; then
            bindings=true
            fft=true
            linalg=true
            sparse=true
            tensor=true
            distributed=true
            device=true
            shared=true
          else
            bindings="${BINDINGS}"
            fft="${FFT}"
            linalg="${LINALG}"
            sparse="${SPARSE}"
            tensor="${TENSOR}"
            distributed="${DISTRIBUTED}"
            device="${DEVICE}"
            shared="${SHARED}"
          fi

          or_flag() {
            for v in "$@"; do
              if [[ "${v}" == "true" ]]; then
                echo "true"
                return
              fi
            done
            echo "false"
          }

          # Build gating: nvmath-python is a single package, so the build is
          # binary. Any change forces a rebuild.
          build="$(or_flag "${shared}" "${bindings}" "${fft}" "${linalg}" "${sparse}" "${tensor}" "${distributed}" "${device}")"

          # Test gating: tests for a submodule must run whenever that
          # submodule, nvmath.bindings (every submodule depends on it), or
          # shared infra changes.
          test_bindings="$(or_flag "${shared}" "${bindings}")"
          test_fft="$(or_flag "${shared}" "${bindings}" "${fft}")"
          test_linalg="$(or_flag "${shared}" "${bindings}" "${linalg}")"
          test_sparse="$(or_flag "${shared}" "${bindings}" "${sparse}")"
          test_tensor="$(or_flag "${shared}" "${bindings}" "${tensor}")"
          test_distributed="$(or_flag "${shared}" "${bindings}" "${distributed}")"
          test_device="$(or_flag "${shared}" "${bindings}" "${device}")"

          {
            echo "bindings=${bindings}"
            echo "fft=${fft}"
            echo "linalg=${linalg}"
            echo "sparse=${sparse}"
            echo "tensor=${tensor}"
            echo "distributed=${distributed}"
            echo "device=${device}"
            echo "shared=${shared}"
            echo "build=${build}"
            echo "test_bindings=${test_bindings}"
            echo "test_fft=${test_fft}"
            echo "test_linalg=${test_linalg}"
            echo "test_sparse=${test_sparse}"
            echo "test_tensor=${test_tensor}"
            echo "test_distributed=${test_distributed}"
            echo "test_device=${test_device}"
          } >> "$GITHUB_OUTPUT"

  # NOTE: Build jobs are intentionally split by platform rather than using a single
  # matrix. This allows each test job to depend only on its corresponding build,
  # so faster platforms can proceed through build & test without waiting for slower
  # ones. Keep these job definitions textually identical except for:
  #   - host-platform value
  #   - if: condition (build-linux-64 omits doc-only check since it's needed for docs)
  build-linux-64:
    needs:
      - should-skip
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-64
        # TODO(nvmath-python CI matrix): expand ctk-variant per top-of-file spec.
        ctk-variant:
          - cu12
          - cu13
    name: Build ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.skip) }}
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}

  # See build-linux-64 for why build jobs are split by platform.
  build-linux-aarch64:
    needs:
      - should-skip
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-aarch64
        ctk-variant:
          - cu12
          - cu13
    name: Build ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.skip) && !fromJSON(needs.should-skip.outputs.doc-only) }}
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}

  # See build-linux-64 for why build jobs are split by platform.
  # TODO(nvmath-python CI matrix): the user-provided test matrix does not include
  # Windows. Decide whether Windows build/test jobs should stay.
  build-windows:
    needs:
      - should-skip
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - win-64
        ctk-variant:
          - cu12
          - cu13
    name: Build ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.skip) && !fromJSON(needs.should-skip.outputs.doc-only) }}
    secrets: inherit
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}

  # NOTE: test-sdist jobs are split by platform (mirroring build-* and test-wheel-*)
  # so platform-specific sources (e.g. bindings/*_windows.pyx selected by
  # build_hooks.py) are exercised on their target OS. Keep these job definitions
  # textually identical except for:
  #   - host-platform value
  #   - uses: (test-sdist-linux.yml vs test-sdist-windows.yml)
  test-sdist-linux:
    needs:
      - should-skip
    name: Test sdist linux-64
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.skip) && !fromJSON(needs.should-skip.outputs.doc-only) }}
    secrets: inherit
    uses: ./.github/workflows/test-sdist-linux.yml
    with:
      host-platform: linux-64

  # See test-sdist-linux for why sdist test jobs are split by platform.
  test-sdist-windows:
    needs:
      - should-skip
    name: Test sdist win-64
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.skip) && !fromJSON(needs.should-skip.outputs.doc-only) }}
    secrets: inherit
    uses: ./.github/workflows/test-sdist-windows.yml
    with:
      host-platform: win-64

  # NOTE: Test jobs are split by platform for the same reason as build jobs (see
  # build-linux-64). Keep these job definitions textually identical except for:
  #   - host-platform value
  #   - build job under needs:
  #   - uses: (test-wheel-linux.yml vs test-wheel-windows.yml)
  test-linux-64:
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-64
        ctk-variant:
          - cu12
          - cu13
    name: Test ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read  # This is required for actions/checkout
    needs:
      - should-skip
      - detect-changes
      - build-linux-64
    secrets: inherit
    uses: ./.github/workflows/test-wheel-linux.yml
    with:
      build-type: pull-request
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1}}
      skip-bindings-test: ${{ !fromJSON(needs.detect-changes.outputs.test_bindings) }}
      skip-fft-test: ${{ !fromJSON(needs.detect-changes.outputs.test_fft) }}
      skip-linalg-test: ${{ !fromJSON(needs.detect-changes.outputs.test_linalg) }}
      skip-sparse-test: ${{ !fromJSON(needs.detect-changes.outputs.test_sparse) }}
      skip-tensor-test: ${{ !fromJSON(needs.detect-changes.outputs.test_tensor) }}
      skip-distributed-test: ${{ !fromJSON(needs.detect-changes.outputs.test_distributed) }}
      skip-device-test: ${{ !fromJSON(needs.detect-changes.outputs.test_device) }}

  # See test-linux-64 for why test jobs are split by platform.
  test-linux-aarch64:
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - linux-aarch64
        ctk-variant:
          - cu12
          - cu13
    name: Test ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read  # This is required for actions/checkout
    needs:
      - should-skip
      - detect-changes
      - build-linux-aarch64
    secrets: inherit
    uses: ./.github/workflows/test-wheel-linux.yml
    with:
      build-type: pull-request
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1}}
      skip-bindings-test: ${{ !fromJSON(needs.detect-changes.outputs.test_bindings) }}
      skip-fft-test: ${{ !fromJSON(needs.detect-changes.outputs.test_fft) }}
      skip-linalg-test: ${{ !fromJSON(needs.detect-changes.outputs.test_linalg) }}
      skip-sparse-test: ${{ !fromJSON(needs.detect-changes.outputs.test_sparse) }}
      skip-tensor-test: ${{ !fromJSON(needs.detect-changes.outputs.test_tensor) }}
      skip-distributed-test: ${{ !fromJSON(needs.detect-changes.outputs.test_distributed) }}
      skip-device-test: ${{ !fromJSON(needs.detect-changes.outputs.test_device) }}

  # See test-linux-64 for why test jobs are split by platform.
  test-windows:
    strategy:
      fail-fast: false
      matrix:
        host-platform:
          - win-64
        ctk-variant:
          - cu12
          - cu13
    name: Test ${{ matrix.host-platform }}, ${{ matrix.ctk-variant }}
    if: ${{ github.repository_owner == 'NVIDIA' && !fromJSON(needs.should-skip.outputs.doc-only) }}
    permissions:
      contents: read  # This is required for actions/checkout
    needs:
      - should-skip
      - detect-changes
      - build-windows
    secrets: inherit
    uses: ./.github/workflows/test-wheel-windows.yml
    with:
      build-type: pull-request
      host-platform: ${{ matrix.host-platform }}
      ctk-variant: ${{ matrix.ctk-variant }}
      nruns: ${{ (github.event_name == 'schedule' && 100) || 1}}
      skip-bindings-test: ${{ !fromJSON(needs.detect-changes.outputs.test_bindings) }}
      skip-fft-test: ${{ !fromJSON(needs.detect-changes.outputs.test_fft) }}
      skip-linalg-test: ${{ !fromJSON(needs.detect-changes.outputs.test_linalg) }}
      skip-sparse-test: ${{ !fromJSON(needs.detect-changes.outputs.test_sparse) }}
      skip-tensor-test: ${{ !fromJSON(needs.detect-changes.outputs.test_tensor) }}
      skip-distributed-test: ${{ !fromJSON(needs.detect-changes.outputs.test_distributed) }}
      skip-device-test: ${{ !fromJSON(needs.detect-changes.outputs.test_device) }}

  doc:
    name: Docs
    if: ${{ github.repository_owner == 'NVIDIA' }}
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    needs:
      - build-linux-64
    secrets: inherit
    uses: ./.github/workflows/build-docs.yml
    with:
      is-release: ${{ github.ref_type == 'tag' }}

  checks:
    name: Check job status
    if: always()
    runs-on: ubuntu-latest
    needs:
      - should-skip
      - detect-changes
      - test-sdist-linux
      - test-sdist-windows
      - test-linux-64
      - test-linux-aarch64
      - test-windows
      - doc
    steps:
      - name: Exit
        run: |
          # if any dependencies were cancelled or failed, that's a failure
          #
          # see https://docs.github.com/en/actions/reference/workflows-and-actions/expressions#always
          # and https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
          # for why this cannot be encoded in the job-level `if:` field
          #
          # TL; DR: `$REASONS`
          #
          # The intersection of skipped-as-success and required status checks
          # creates a scenario where if you DON'T `always()` run this job, the
          # status check UI will block merging and if you DO `always()` run and
          # a dependency is _cancelled_ (due to a critical failure, which is
          # somehow not considered a failure ¯\_(ツ)_/¯) then the critically
          # failing job(s) will timeout causing a cancellation here and the
          # build to succeed which we don't want (originally this was just
          # 'exit 0')
          #
          # Note: When [doc-only] is in PR title, test jobs are intentionally
          # skipped and should not cause failure.
          #
          # detect-changes gates whether heavy test matrices run at all; if it
          # does not succeed, downstream test jobs are skipped rather than
          # failed, which would otherwise go unnoticed here. Require its
          # success explicitly so a broken gating step cannot masquerade as a
          # green CI run.
          doc_only=${{ needs.should-skip.outputs.doc-only }}
          if ${{ needs.detect-changes.result != 'success' }}; then
            exit 1
          fi
          if ${{ needs.doc.result == 'cancelled' || needs.doc.result == 'failure' }}; then
            exit 1
          fi
          if ${{ needs.test-sdist-linux.result == 'cancelled' ||
                 needs.test-sdist-linux.result == 'failure' ||
                 needs.test-sdist-windows.result == 'cancelled' ||
                 needs.test-sdist-windows.result == 'failure' }}; then
            exit 1
          fi
          if [[ "${doc_only}" != "true" ]]; then
            if ${{ needs.test-linux-64.result == 'cancelled' ||
                   needs.test-linux-64.result == 'failure' ||
                   needs.test-linux-aarch64.result == 'cancelled' ||
                   needs.test-linux-aarch64.result == 'failure' ||
                   needs.test-windows.result == 'cancelled' ||
                   needs.test-windows.result == 'failure' }}; then
              exit 1
            fi
          fi
          exit 0
