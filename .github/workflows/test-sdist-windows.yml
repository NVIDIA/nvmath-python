# Windows counterpart of test-sdist-linux.yml. Exists so that platform-gated
# sources (e.g. bindings/*_windows.pyx selected by build_hooks.py) are
# exercised by the sdist completeness test. Keep the shape of this file in
# sync with test-sdist-linux.yml aside from Windows-specific setup (MSVC,
# no sccache, no proxy cache).

on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  test-sdist:
    name: Test sdist build
    runs-on: windows-2022
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1

      - name: Install build tools
        run: pip install build

      # nvmath.bindings contains Cython extensions that need CTK headers.
      # No sccache on Windows (this is a correctness smoke test, not a
      # production build).
      # TODO(nvmath-python CI): align this CTK version with the cu13 row of the
      # matrix spec in ci.yml once build-wheel.yml is implemented.
      - name: Set up mini CTK
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: "13.0.0"

      - name: Build nvmath-python sdist and wheel-from-sdist
        run: |
          export CUDA_PYTHON_PARALLEL_LEVEL=$(nproc)
          python -m build --sdist .
          pip wheel --no-deps --wheel-dir dist dist/*.tar.gz
