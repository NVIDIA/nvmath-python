# Smoke-tests that `python -m build --sdist .` produces a tarball from which a
# wheel can be rebuilt. nvmath-python is a single package rooted at the repo
# root, so this workflow builds one sdist and one wheel-from-sdist.

on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  test-sdist:
    name: Test sdist build
    runs-on: linux-amd64-cpu8
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      # nvmath.bindings contains Cython extensions that need CTK headers at
      # wheel-from-sdist time. This uses sccache to speed up repeat builds.
      - name: Enable sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad  # 0.0.9
        with:
          disable_annotations: 'true'

      # xref: https://github.com/orgs/community/discussions/42856#discussioncomment-7678867
      - name: Adding additional GHA cache-related env vars
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'])

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true

      # TODO(nvmath-python CI): align this CTK version with the cu13 row of the
      # matrix spec in ci.yml once build-wheel.yml is implemented.
      - name: Set up mini CTK
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: "13.0.0"

      - name: Build nvmath-python sdist and wheel-from-sdist
        run: |
          export CC="sccache cc"
          export CXX="sccache c++"
          python -m build --sdist .
          pip wheel --no-deps --wheel-dir dist dist/*.tar.gz

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
