# TODO(nvmath-python CI): Implement the nvmath-python wheel build.
#
# The previous contents of this file were copied from cuda-python and built
# three separate wheels (cuda.pathfinder, cuda.bindings, cuda.core) out of a
# monorepo. nvmath-python is a single package rooted at `nvmath/` with a
# setuptools build_ext invoking Cython + CUDA, so the monorepo-shaped build
# does not apply. See `pyproject.toml` for the actual build configuration.
#
# What this workflow needs to do (follow-up implementation):
#   1. Check out the repo and set up Python per `matrix.python-version`.
#   2. Fetch the CTK components needed for Cython-compiling nvmath.bindings
#      (see .github/actions/fetch_ctk). The CTK version selected depends on
#      `inputs.ctk-variant` (cu12 vs cu13 — cu13 needs a 13.x CTK).
#   3. Run `pip wheel -v --no-deps .` (or cibuildwheel) to build one
#      nvmath-python wheel per `matrix.python-version` x `inputs.host-platform`.
#   4. Upload the resulting wheel as an artifact named
#      `nvmath-python-wheel-${host-platform}-${ctk-variant}-py${python-version}`
#      so the downstream test-wheel-*.yml jobs can download it.
#
# Until this is implemented, the job below exits successfully with a TODO
# message so the ci.yml dependency graph remains valid.

on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string
      ctk-variant:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  build:
    name: Build (TODO)
    runs-on: ubuntu-latest
    steps:
