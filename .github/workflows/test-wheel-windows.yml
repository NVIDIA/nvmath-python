# TODO(nvmath-python CI): Implement (or delete) the nvmath-python Windows
# wheel test matrix.
#
# The previous contents of this file were copied from cuda-python and tested
# three separate wheels on Windows. The nvmath-python test matrix in ci.yml
# currently has NO Windows rows (see the CSV spec embedded there), so this
# workflow may end up being deleted entirely once the Linux matrix is wired in.
# For now it exists as a stub so ci.yml's test-windows job can still call it.
#
# If Windows support is needed, mirror the Linux workflow: download the
# windows wheel artifact built by build-wheel.yml, install the CTK variant
# indicated by `inputs.ctk-variant`, and run the per-submodule buckets gated
# by the `skip-*-test` inputs. See test-wheel-linux.yml for the full spec.

on:
  workflow_call:
    inputs:
      build-type:
        required: true
        type: string
      host-platform:
        required: true
        type: string
      ctk-variant:
        required: true
        type: string
      nruns:
        required: false
        default: 1
        type: number
      skip-bindings-test:
        required: false
        default: false
        type: boolean
      skip-fft-test:
        required: false
        default: false
        type: boolean
      skip-linalg-test:
        required: false
        default: false
        type: boolean
      skip-sparse-test:
        required: false
        default: false
        type: boolean
      skip-tensor-test:
        required: false
        default: false
        type: boolean
      skip-distributed-test:
        required: false
        default: false
        type: boolean
      skip-device-test:
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  test:
    name: Test Windows (TODO)
    runs-on: ubuntu-latest
    steps:
      - name: TODO — implement or delete nvmath-python Windows tests
        run: |
          echo "::warning::test-wheel-windows.yml is a stub. Decide whether Windows is in-scope; see ci.yml CSV."
          echo "host-platform: ${{ inputs.host-platform }}"
          echo "ctk-variant:   ${{ inputs.ctk-variant }}"
